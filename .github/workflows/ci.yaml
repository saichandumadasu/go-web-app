name: CI for Go Web App
on: 
  push:
    branches:
      - master
    paths-ignore:
        - 'README.md'
        - '.github/workflows/ci.yaml'
        - 'go-web-app/k8s/**'
        - 'go-web-app/helm/**'
        - '.github/workflows/**'
        - 'helm/**'
        - 'k8s/**'
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Build the application
        run: go build -o go-web-app ./...

      - name: Run tests
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.53.3

  push:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: timestamptag
        id: timestamptag
        run: echo "TAG=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{ github.run_id }},${{ secrets.DOCKER_USERNAME }}/go-web-app:latest

  update-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update Helm chart values
        run: |
          sed -i "s/tag:.*/tag: ${{ github.run_id }}/" helm/go-web-app/values.yaml

      - name: Commit and push changes
        run: |
          echo "commit with botuser details "
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/go-web-app/values.yaml
          if git diff --cached --quiet; then
            echo "No Helm chart changes to commit"
            exit 0
          fi
          git commit -m "Update Helm chart image tag to ${{ github.run_id }}"
          git push origin master


        
